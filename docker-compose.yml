# ══════════════════════════════════════════════════════════
# Astra – Docker Compose (Entwicklung)
# Start: docker compose up
# ══════════════════════════════════════════════════════════

services:
  # ── PostgreSQL ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: astra
      POSTGRES_USER: astra
      POSTGRES_PASSWORD: astra
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astra -d astra"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      APP_ENV: development
      FLASK_ENV: development
      DATABASE_URL: postgresql://astra:astra@postgres:5432/astra
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-docker
      JWT_SECRET_KEY: dev-jwt-secret-docker
      RUNNER_ADAPTER: stub
      AUTO_MIGRATE: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: ["serve"]

  # ── Frontend (Dev) ────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
